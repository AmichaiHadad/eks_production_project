replicas: 1

serviceAccount:
  create: true
  name: karpenter-controller
  annotations:
    eks.amazonaws.com/role-arn: ${iam_role_arn}

settings:
  aws:
    clusterName: ${cluster_name}
    clusterEndpoint: ${cluster_endpoint}
    defaultInstanceProfile: KarpenterNodeInstanceProfile-${cluster_name}
    interruptionQueueName: ${cluster_name}

controller:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 1Gi

nodeTemplate:
  subnetSelector:
    kubernetes.io/cluster/${cluster_name}: owned
  securityGroupSelector:
    kubernetes.io/cluster/${cluster_name}: owned

# Enable pod affinity to run on management node group
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role
          operator: In
          values:
          - management
  tolerations:
  - key: "management"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"